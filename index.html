<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DocAuto">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<title>DocAuto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f0;--text2:#888;--text3:#555;--green:#4ade80;--green-bg:rgba(74,222,128,0.1);--amber:#fb923c;--amber-bg:rgba(251,146,60,0.1);--red:#f87171;--red-bg:rgba(248,113,113,0.1);--accent:#e8e8e8;--at:#000;--radius:14px;--rsm:8px;}
body.light{--bg:#f5f5f0;--bg2:#fff;--bg3:#eeede8;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#111;--text2:#666;--text3:#aaa;--green:#16a34a;--green-bg:rgba(22,163,74,0.1);--amber:#d97706;--amber-bg:rgba(217,119,6,0.1);--red:#dc2626;--red-bg:rgba(220,38,38,0.1);--accent:#111;--at:#fff;}
body.light .topbar{background:rgba(245,245,240,0.95);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(15,15,15,0.95);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:20px;font-weight:600;letter-spacing:-0.3px;}
.topbar p{font-size:11px;color:var(--text2);margin-top:1px;}
.topbar-r{display:flex;align-items:center;gap:8px;}
.tbtn{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s;}
.tbtn:active{transform:scale(0.92);}
.fab{width:40px;height:40px;border-radius:50%;background:var(--accent);color:var(--at);border:none;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s;}
.fab:active{transform:scale(0.92);}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 16px 10px;}
.pill{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rsm);padding:10px 12px;display:flex;flex-direction:column;gap:2px;}
.pill .n{font-size:22px;font-weight:600;line-height:1;}
.pill .l{font-size:10px;color:var(--text2);}
.n-ok{color:var(--green)}.n-warn{color:var(--amber)}.n-danger{color:var(--red)}
.cars{padding:4px 16px 120px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.card-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background 0.1s;}
.card-hd:hover{background:var(--bg3);}
.thumb{width:52px;height:52px;border-radius:10px;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb-ph{font-size:18px;font-weight:600;color:var(--text2);}
.cm{flex:1;min-width:0;}
.cn{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cp{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);margin-top:3px;background:var(--bg3);border-radius:4px;padding:1px 6px;display:inline-block;}
.cr{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot-ok{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot-warn{background:var(--amber);box-shadow:0 0 6px var(--amber);}
.dot-danger{background:var(--red);box-shadow:0 0 6px var(--red);}
.chev{color:var(--text3);font-size:12px;transition:transform 0.2s;}
.chev.open{transform:rotate(180deg);}
.docs{border-top:0.5px solid var(--border);}
.dr{display:flex;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--border);gap:12px;cursor:pointer;transition:background 0.1s;}
.dr:last-child{border-bottom:none;}
.dr:hover{background:var(--bg3);}
.db{font-size:10px;font-weight:600;letter-spacing:0.05em;padding:3px 8px;border-radius:5px;flex-shrink:0;min-width:72px;text-align:center;}
.ok{background:var(--green-bg);color:var(--green);}
.warn{background:var(--amber-bg);color:var(--amber);}
.danger{background:var(--red-bg);color:var(--red);}
.dn{font-size:14px;font-weight:500;flex:1;}
.de{font-size:11px;color:var(--text2);flex-shrink:0;}
.dd{font-size:11px;flex-shrink:0;min-width:60px;text-align:right;}
.dd-ok{color:var(--green)}.dd-warn{color:var(--amber)}.dd-danger{color:var(--red)}
.card-ft{border-top:0.5px solid var(--border);display:flex;}
.card-ft button{flex:1;padding:12px;background:none;border:none;font-size:13px;cursor:pointer;transition:background 0.1s;color:var(--text2);}
.card-ft button:hover{background:var(--bg3);}
.del-btn{color:var(--red)!important;border-left:0.5px solid var(--border)!important;}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 32px;text-align:center;gap:12px;}
.empty-ic{font-size:56px;}
.empty h2{font-size:18px;font-weight:600;}
.empty p{font-size:14px;color:var(--text2);line-height:1.5;}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;animation:fi 0.18s ease;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{width:100%;background:var(--bg2);border-radius:20px 20px 0 0;border-top:0.5px solid var(--border2);padding-bottom:28px;animation:su 0.25s cubic-bezier(0.32,0.72,0,1);max-height:92vh;overflow-y:auto;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px;}
.sheet-hd{padding:8px 20px 16px;display:flex;align-items:center;justify-content:space-between;}
.sheet-hd span{font-size:17px;font-weight:600;}
.xbtn{background:var(--bg3);border:none;color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.body{padding:0 20px 8px;display:flex;flex-direction:column;gap:14px;}
.f{display:flex;flex-direction:column;gap:5px;}
.f label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.04em;text-transform:uppercase;}
.inp{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--rsm);padding:12px 14px;color:var(--text);font-size:15px;width:100%;font-family:inherit;}
.inp:focus{outline:none;border-color:rgba(255,255,255,0.35);}
body.light .inp:focus{border-color:rgba(0,0,0,0.4);}
input[type=date].inp{color-scheme:dark;}
body.light input[type=date].inp{color-scheme:light;}
select.inp{cursor:pointer;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sec{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding-top:4px;border-top:0.5px solid var(--border);}
.prim{margin:16px 20px 0;background:var(--accent);color:var(--at);border:none;border-radius:var(--rsm);padding:15px;font-size:15px;font-weight:600;width:calc(100% - 40px);cursor:pointer;transition:opacity 0.15s;font-family:inherit;}
.prim:hover{opacity:0.85;}
.prev{font-size:12px;color:var(--text2);line-height:1.6;min-height:16px;}
.pb{height:46px;border-radius:var(--rsm);background:var(--bg3);border:0.5px solid var(--border2);display:flex;align-items:center;overflow:hidden;cursor:pointer;transition:border-color 0.15s;}
.pb:hover{border-color:var(--text2);}
.pb img{width:46px;height:46px;object-fit:cover;flex-shrink:0;display:block;}
.pb-ph{display:flex;align-items:center;gap:8px;color:var(--text2);padding:0 14px;font-size:13px;width:100%;}
.pbr{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;padding:3px 0;font-family:inherit;}

.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(15,15,15,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);}
body.light .tabbar{background:rgba(245,245,240,0.96);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 12px;cursor:pointer;gap:4px;border:none;background:none;transition:opacity 0.15s;}
.tab-ic{font-size:22px;line-height:1;}
.tab-lbl{font-size:10px;font-weight:500;letter-spacing:0.02em;color:var(--text3);transition:color 0.15s;}
.tab.active .tab-lbl{color:var(--green);}
.tab-indicator{width:4px;height:4px;border-radius:50%;background:var(--green);margin-top:2px;opacity:0;transition:opacity 0.15s;}
.tab.active .tab-indicator{opacity:1;}
#page-docauto{display:block;}
#page-planner{display:none;}

.confirm-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:24px;animation:fi 0.15s ease;}
.confirm-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:24px;width:100%;max-width:320px;text-align:center;}
.confirm-box h3{font-size:16px;font-weight:600;margin-bottom:8px;}
.confirm-box p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btns button{flex:1;padding:12px;border:none;border-radius:var(--rsm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.confirm-cancel{background:var(--bg3);color:var(--text);}
.confirm-ok{background:var(--red);color:#fff;}

/* ── CAR PLANNER ── */
/* Uses DocAuto's existing CSS vars: --bg, --bg2, --bg3, --border, --border2, --text, --text2, --text3, --green, --amber, --red, --radius, --rsm */
:root{--pl-blue:#3b7bbf;--pl-blue2:rgba(59,123,191,0.1);--pl-green2:#4ade80;--pl-orange:#fb923c;}
.pl-topbar{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;backdrop-filter:blur(20px);width:100%;}
.pl-topbar h1{font-size:20px;font-weight:600;letter-spacing:-0.3px;color:var(--text);}
.pl-topbar p{font-size:11px;color:var(--text2);margin-top:1px;}
.pl-fab{width:40px;height:40px;border-radius:50%;background:var(--pl-blue);color:#fff;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s;}
.pl-fab:active{transform:scale(0.92);}
.pl-list{padding:4px 16px 16px;width:100%;}
.pl-car-row{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;border:0.5px solid var(--border);transition:background 0.1s;}
.pl-car-row:hover{background:var(--bg3);}
.pl-car-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pl-car-info{flex:1;min-width:0;}
.pl-car-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-car-sub{font-size:11px;color:var(--text2);margin-top:3px;}
.pl-chev{color:var(--text3);font-size:12px;}
/* Sheet - same as DocAuto sheet */
.pl-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;animation:fi 0.18s ease;}
.pl-sheet{width:100%;background:var(--bg2);border-radius:20px 20px 0 0;border-top:0.5px solid var(--border2);max-height:88%;min-height:55%;overflow-y:auto;animation:su 0.25s cubic-bezier(0.32,0.72,0,1);-webkit-overflow-scrolling:touch;}
.pl-sh{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px;}
.pl-sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 16px;}
.pl-sheet-title{font-size:17px;font-weight:600;color:var(--text);}
.pl-sheet-save{font-size:14px;font-weight:600;color:var(--pl-blue);background:none;border:none;cursor:pointer;font-family:inherit;}
.pl-sheet-x{font-size:14px;color:var(--text2);background:var(--bg3);border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.pl-form{padding:0 20px 24px;display:flex;flex-direction:column;gap:14px;}
.pl-field{display:flex;flex-direction:column;gap:5px;}
.pl-field label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.04em;text-transform:uppercase;}
.pl-inp{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--rsm);padding:12px 14px;color:var(--text);font-size:15px;width:100%;font-family:inherit;}
.pl-inp:focus{outline:none;border-color:rgba(255,255,255,0.35);}
body.light .pl-inp:focus{border-color:rgba(0,0,0,0.4);}
.pl-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pl-colors{display:flex;flex-wrap:wrap;gap:10px;}
.pl-color-dot{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;}
.pl-color-dot.sel{border-color:var(--text);transform:scale(1.1);}
/* Car detail topbar */
.pl-back{font-size:22px;color:var(--pl-blue);background:none;border:none;cursor:pointer;padding:0;line-height:1;}
.pl-detail-name{font-size:15px;font-weight:600;color:var(--text);}
.pl-del-btn{width:32px;height:32px;border-radius:var(--rsm);background:var(--red-bg);border:none;color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* Stats bar */
.pl-stats{display:grid;grid-template-columns:repeat(3,1fr);text-align:center;background:var(--bg2);border-bottom:0.5px solid var(--border);}
.pl-stat{padding:10px 0;border-right:0.5px solid var(--border);}
.pl-stat:last-child{border-right:none;}
.pl-stat-n{font-size:20px;font-weight:600;color:var(--text);line-height:1;}
.pl-stat-n.green{color:var(--green);}
.pl-stat-n.blue{color:var(--pl-blue);}
.pl-stat-n.orange{color:var(--amber);}
.pl-stat-l{font-size:10px;color:var(--text2);margin-top:3px;}
/* Tabs */
.pl-tabs{display:flex;margin:12px 16px 0;background:var(--bg3);border-radius:var(--rsm);padding:3px;}
.pl-tab{flex:1;padding:8px;border-radius:6px;border:none;background:none;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;}
.pl-tab.active{background:var(--pl-blue);color:#fff;}
/* Search */
.pl-search{margin:12px 16px 0;position:relative;}
.pl-search input{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rsm);padding:10px 14px 10px 36px;color:var(--text);font-size:14px;font-family:inherit;}
.pl-search input:focus{outline:none;border-color:var(--pl-blue);}
.pl-search-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:14px;}
/* Filters */
.pl-filters{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;}
.pl-filters::-webkit-scrollbar{display:none;}
.pl-filter{padding:6px 14px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;}
.pl-filter.active{background:var(--pl-blue);color:#fff;border-color:var(--pl-blue);}
/* Empty */
.pl-empty{text-align:center;padding:48px 24px;color:var(--text2);}
.pl-empty-ic{font-size:48px;margin-bottom:12px;}
.pl-empty p{font-size:14px;line-height:1.5;}
/* Category grid */
.pl-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;}
.pl-cat-card{background:var(--bg2);border-radius:var(--radius);padding:14px;cursor:pointer;border:0.5px solid var(--border);transition:background 0.1s;}
.pl-cat-card:hover{background:var(--bg3);}
.pl-cat-ic{width:40px;height:40px;border-radius:10px;background:var(--pl-blue2);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:8px;}
.pl-cat-n{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
.pl-cat-sub{font-size:11px;color:var(--text2);}
.pl-cat-prog{height:3px;background:var(--border);border-radius:2px;margin-top:8px;}
.pl-cat-prog-bar{height:100%;background:var(--pl-blue);border-radius:2px;}
/* Subcategory list */
.pl-subcat-list{padding:0 16px 100px;}
.pl-subcat-hd{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;padding:14px 0 8px;display:flex;align-items:center;justify-content:space-between;}
.pl-subcat-add{font-size:13px;font-weight:600;color:var(--pl-blue);background:none;border:none;cursor:pointer;font-family:inherit;}
.pl-sub-row{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;border:0.5px solid var(--border);transition:background 0.1s;}
.pl-sub-row:hover{background:var(--bg3);}
.pl-sub-row.active-sel{background:var(--pl-blue2);border-color:var(--pl-blue);}
.pl-sub-ic{width:32px;height:32px;border-radius:var(--rsm);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.pl-sub-row.active-sel .pl-sub-ic{background:var(--pl-blue);}
.pl-sub-name{flex:1;font-size:14px;font-weight:500;color:var(--text);}
.pl-sub-row.active-sel .pl-sub-name{color:var(--pl-blue);font-weight:600;}
.pl-sub-count{font-size:13px;color:var(--text2);}
.pl-sub-plus{width:28px;height:28px;border-radius:var(--rsm);background:var(--pl-blue);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
/* Task row */
.pl-task-row{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin:0 16px 8px;display:flex;align-items:flex-start;gap:12px;border:0.5px solid var(--border);transition:background 0.1s;cursor:pointer;}
.pl-task-row:hover{background:var(--bg3);}
.pl-task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:background 0.15s;}
.pl-task-check.done{background:var(--green);border-color:var(--green);color:#000;}
.pl-task-info{flex:1;}
.pl-task-name{font-size:14px;font-weight:500;color:var(--text);}
.pl-task-name.done{text-decoration:line-through;color:var(--text2);}
.pl-task-meta{font-size:11px;color:var(--text2);margin-top:3px;}
.pl-task-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block;margin-top:4px;}
.pl-task-status.waiting{background:var(--amber-bg);color:var(--amber);}
.pl-task-status.inprogress{background:var(--pl-blue2);color:var(--pl-blue);}
.pl-task-status.done-s{background:var(--green-bg);color:var(--green);}
/* Icon picker */
.pl-icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:0 20px 20px;}
.pl-ic-btn{width:44px;height:44px;border-radius:var(--rsm);border:0.5px solid var(--border2);background:var(--bg3);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s;}
.pl-ic-btn.sel{background:var(--pl-blue);border-color:var(--pl-blue);}
.pl-preview-row{background:var(--pl-blue2);border-radius:var(--rsm);padding:14px;display:flex;align-items:center;gap:12px;margin:0 20px 16px;}
.pl-preview-ic{width:40px;height:40px;border-radius:var(--rsm);background:var(--pl-blue);display:flex;align-items:center;justify-content:center;font-size:20px;}
.pl-preview-name{font-size:15px;font-weight:500;color:var(--pl-blue);}
/* Status selector */
.pl-task-status-sel{display:flex;gap:8px;}
.pl-status-btn{flex:1;padding:10px 8px;border-radius:var(--rsm);border:0.5px solid var(--border2);background:var(--bg3);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;font-family:inherit;}
.pl-status-btn.sel{border-color:var(--pl-blue);color:var(--pl-blue);background:var(--pl-blue2);}
/* Save button in sheet */
.pl-save-btn{margin:16px 20px 0;background:var(--pl-blue);color:#fff;border:none;border-radius:var(--rsm);padding:15px;font-size:15px;font-weight:600;width:calc(100% - 40px);cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
.pl-save-btn:hover{opacity:0.85;}
</style>
</head>
<body>
<div id="page-docauto">
<div class="topbar">
  <div><h1>DocAuto</h1><p>ITP &middot; RCA &middot; Rovinieta &middot; Revizie</p></div>
  <div class="topbar-r">
    <button class="tbtn" id="themeBtn" onclick="toggleTheme()">&#127769;</button>
    <button class="fab" onclick="openAdd()">+</button>
  </div>
</div>
<div class="summary" id="sum"></div>
<div class="cars" id="cars"></div>
</div>

<div id="page-planner" style="position:fixed;top:0;left:0;right:0;bottom:60px;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);"><div id="pl-root" style="width:100%;min-height:100%;"></div>
</div>

<div id="ov" style="display:none;"></div>
<input type="file" id="fi" accept="image/*,application/pdf" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;" onchange="onFile(this)">

<script>
var SK='docauto_v8', cars=[], exp={}, _fsfx='car';
var DK=['itp','rca','rovinieta','revizie'];
var DL={itp:'ITP',rca:'RCA',rovinieta:'Rovinieta',revizie:'Revizie'};

function load(){
  try{cars=JSON.parse(localStorage.getItem(SK))||[];}catch(e){cars=[];}
  // start empty
}
function save(){try{localStorage.setItem(SK,JSON.stringify(cars));}catch(e){}}

function dl(d){if(!d)return null;var a=new Date(d);a.setHours(0,0,0,0);var b=new Date();b.setHours(0,0,0,0);return Math.ceil((a-b)/864e5);}
function stOf(d){if(d===null||d<0)return'danger';if(d<=30)return'warn';return'ok';}
function rkl(r){if(!r||!r.lk)return null;return(+r.lk||0)+(+r.iv||10000)-(+r.ck||0);}
function rst(r){var k=rkl(r);if(k===null||k<=0)return'danger';if(k<=1500)return'warn';return'ok';}
function rnk(r){if(!r||!r.lk)return null;return(+r.lk||0)+(+r.iv||10000);}
function cst(c){
  var w='ok';
  for(var i=0;i<DK.length;i++){var k=DK[i],s;
    if(k==='revizie')s=rst(c.docs&&c.docs.revizie);
    else s=stOf(dl(c.docs&&c.docs[k]&&c.docs[k].ex));
    if(s==='danger')return'danger';if(s==='warn')w='warn';}
  return w;
}
function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('ro-RO',{day:'2-digit',month:'short',year:'numeric'});}
function fk(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('ro-RO')+' km';}
function dl2(d){if(d===null)return'Necompletat';if(d<0)return'Exp.'+Math.abs(d)+'z';if(d===0)return'Azi!';if(d===1)return'Maine!';return d+'z';}
function bl(d){if(d===null)return'LIPSA';if(d<0)return'EXPIRAT';if(d<=30)return'EXPIRA';return'VALID';}
function am(ds,mo){var d=new Date(ds);d.setMonth(d.getMonth()+mo);return d.toISOString().split('T')[0];}

function renderSum(){
  var ok=0,w=0,d=0;
  cars.forEach(function(c){var s=cst(c);if(s==='ok')ok++;else if(s==='warn')w++;else d++;});
  document.getElementById('sum').innerHTML=
    '<div class="pill"><span class="n n-ok">'+ok+'</span><span class="l">Fara probleme</span></div>'+
    '<div class="pill"><span class="n n-warn">'+w+'</span><span class="l">Expira curand</span></div>'+
    '<div class="pill"><span class="n n-danger">'+d+'</span><span class="l">Probleme</span></div>';
}

function renderCars(){
  var el=document.getElementById('cars');
  if(!cars.length){el.innerHTML='<div class="empty"><div class="empty-ic">&#128663;</div><h2>Nicio masina</h2><p>Apasa + pentru a adauga prima masina.</p></div>';return;}
  el.innerHTML='';
  cars.forEach(function(car){
    var cs=cst(car),isOpen=!!exp[car.id];
    var div=document.createElement('div');div.className='card';
    var init=(car.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var thumbH=car.photo
      ?'<div class="thumb"><img src="'+car.photo+'" alt="'+car.name+'"></div>'
      :'<div class="thumb"><div class="thumb-ph">'+init+'</div></div>';
    var hd=document.createElement('div');hd.className='card-hd';
    hd.innerHTML=thumbH+'<div class="cm"><div class="cn">'+car.name+'</div><div class="cp">'+(car.plate||'fara numar')+'</div></div><div class="cr"><div class="dot dot-'+cs+'"></div><span class="chev'+(isOpen?' open':'')+'">&#9660;</span></div>';
    hd.onclick=function(){exp[car.id]=!exp[car.id];renderCars();};
    div.appendChild(hd);
    if(isOpen){
      var docsDiv=document.createElement('div');docsDiv.className='docs';
      // Doc rows
      DK.forEach(function(k){
        var row=document.createElement('div');row.className='dr';
        if(k==='revizie'){
          var r=car.docs&&car.docs.revizie||{};
          var st=rst(r),kl=rkl(r),nk=rnk(r);
          var badge=r.lk?(kl<=0?'DEPASIT':kl<=1500?'CURAND':'OK'):'LIPSA';
          var info=r.lk?'urm. '+fk(nk):'Necompletat';
          var ks=kl===null?'':(kl<=0?Math.abs(kl)+' km dep.':kl.toLocaleString('ro-RO')+' km');
          row.innerHTML='<span class="db '+st+'">'+badge+'</span><span class="dn">Revizie</span><span class="de">'+info+'</span><span class="dd dd-'+st+'">'+ks+'</span>';
          row.onclick=function(){editDoc(car.id,'revizie');};
        } else {
          var d=dl(car.docs&&car.docs[k]&&car.docs[k].ex),st=stOf(d);
          row.innerHTML='<span class="db '+st+'">'+bl(d)+'</span><span class="dn">'+DL[k]+'</span><span class="de">'+fd(car.docs&&car.docs[k]&&car.docs[k].ex)+'</span><span class="dd dd-'+st+'">'+dl2(d)+'</span>';
          (function(key){row.onclick=function(){editDoc(car.id,key);};})(k);
        }
        docsDiv.appendChild(row);
      });
      // File rows
      var fLabels={rca:'RCA',carte:'Carte masina',talon:'Talon masina'};
      Object.keys(fLabels).forEach(function(fk2){
        var fdata=car.docs&&car.docs.files&&car.docs.files[fk2];
        if(!fdata)return;
        var isImg=fdata.startsWith('data:image');
        var row=document.createElement('div');row.className='dr';
        row.innerHTML='<span class="db" style="background:var(--green-bg);color:var(--green);min-width:auto">&#128206;</span><span class="dn">'+fLabels[fk2]+'</span><span class="de" style="color:var(--green)">'+(isImg?'Poza':'PDF')+' salvat</span><span class="dd dd-ok">&#128065; Vezi</span>';
        (function(key,data,label){row.onclick=function(){viewFile(car.id,key,data,label);};})(fk2,fdata,fLabels[fk2]);
        docsDiv.appendChild(row);
      });
      div.appendChild(docsDiv);
      var ft=document.createElement('div');ft.className='card-ft';
      var eb=document.createElement('button');eb.innerHTML='&#9998; Editeaza';eb.onclick=function(){editCar(car.id);};
      var db2=document.createElement('button');db2.innerHTML='Sterge';db2.className='del-btn';db2.onclick=function(){delCar(car.id);};
      ft.appendChild(eb);ft.appendChild(db2);
      div.appendChild(ft);
    }
    el.appendChild(div);
  });
}

function render(){renderSum();renderCars();}
function delCar(id){
  var car=cars.find(function(c){return c.id===id;});
  if(!car)return;
  showConfirm(
    'Sterge masina',
    'Stergi \''+car.name+'\' si toate documentele ei?',
    function(){
      cars=cars.filter(function(c){return c.id!==id;});
      delete exp[id];save();render();
    }
  );
}
function showConfirm(title, msg, onOk){
  var el=document.createElement('div');
  el.className='confirm-overlay';
  el.innerHTML='<div class="confirm-box"><h3>'+title+'</h3><p>'+msg+'</p><div class="confirm-btns"><button class="confirm-cancel" id="cCancel">Anuleaza</button><button class="confirm-ok" id="cOk">Sterge</button></div></div>';
  document.body.appendChild(el);
  el.querySelector('#cCancel').onclick=function(){el.remove();};
  el.querySelector('#cOk').onclick=function(){el.remove();onOk();};
  el.onclick=function(e){if(e.target===el)el.remove();};
}

/* SHEET */
function openSheet(html){
  var ov=document.getElementById('ov');
  ov.style.display='flex';ov.className='overlay';
  ov.innerHTML='<div class="sheet"><div class="sh"></div>'+html+'</div>';
  ov.onclick=function(e){if(e.target===ov)closeSheet();};
}
function closeSheet(){var ov=document.getElementById('ov');ov.style.display='none';ov.innerHTML='';}

/* PERIOD SELECT */
function perOpts(sel){
  sel=sel||12;
  return [[3,'3 luni'],[6,'6 luni'],[12,'12 luni (1 an)'],[24,'24 luni (2 ani)']].map(function(p){
    return '<option value="'+p[0]+'"'+(sel==p[0]?' selected':'')+'>'+p[1]+'</option>';
  }).join('');
}

/* PHOTO BOX - built via DOM */
function makePhotoBox(photo, sfx, container){
  var hasPhoto=photo&&photo.length>0;
  var isImg=hasPhoto&&photo.startsWith('data:image');
  // Create a unique file input per box (most reliable cross-browser/iOS approach)
  var fi=document.createElement('input');
  fi.type='file';fi.id='fi_'+sfx;
  fi.accept='image/*,application/pdf';
  fi.style.cssText='position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2;';
  fi.onchange=function(){if(!fi.files||!fi.files[0])return;_fsfx=sfx;onFile(fi);};
  // Box
  var box=document.createElement('div');box.className='pb';box.id='pb_'+sfx;
  box.style.position='relative';
  box.appendChild(fi);
  if(hasPhoto&&isImg){
    var img=document.createElement('img');img.src=photo;img.id='pi_'+sfx;
    box.appendChild(img);
  } else {
    var img2=document.createElement('img');img2.id='pi_'+sfx;img2.style.display='none';
    box.appendChild(img2);
    if(hasPhoto&&!isImg){
      var pdfnote=document.createElement('div');
      pdfnote.style.cssText='color:var(--green);padding:0 14px;font-size:13px;';
      pdfnote.innerHTML='&#128206; Fisier salvat';
      box.appendChild(pdfnote);
    } else {
      var ph=document.createElement('div');ph.className='pb-ph';ph.id='ph_'+sfx;
      ph.innerHTML='<span>&#128247;</span> Apasa sa adaugi';
      box.appendChild(ph);
    }
  }
  container.appendChild(box);
  // Hidden field for value storage
  var hf=document.createElement('input');hf.type='hidden';hf.id='hf_'+sfx;hf.value=photo||'';
  container.appendChild(hf);
  // Remove button
  if(hasPhoto){
    var rb=document.createElement('button');rb.className='pbr';rb.innerHTML='&#10005; Sterge poza';
    rb.onclick=function(){rmFile(sfx);};
    container.appendChild(rb);
  }
}

/* FILE HANDLING */
function trigFile(sfx){_fsfx=sfx;var fi=document.getElementById('fi');fi.value='';fi.click();}
function onFile(inp){
  if(!inp.files||!inp.files[0])return;
  var file=inp.files[0],sfx=_fsfx;
  var reader=new FileReader();
  reader.onload=function(e){
    var data=e.target.result,isImg=file.type.startsWith('image/');
    if(sfx==='car'&&isImg){
      var img=new Image();
      img.onload=function(){
        var mw=600,mh=400,w=img.width,h=img.height;
        if(w>mw){h=Math.round(h*mw/w);w=mw;}
        if(h>mh){w=Math.round(w*mh/h);h=mh;}
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        applyFile(sfx,cv.toDataURL('image/jpeg',0.82),true);
      };
      img.onerror=function(){applyFile(sfx,data,isImg);};
      img.src=data;
    } else {
      applyFile(sfx,data,isImg);
    }
  };
  reader.readAsDataURL(file);
}
function applyFile(sfx,data,isImg){
  var pi=document.getElementById('pi_'+sfx);
  var ph=document.getElementById('ph_'+sfx);
  var box=document.getElementById('pb_'+sfx);
  if(pi&&isImg){pi.src=data;pi.style.display='block';}
  if(!isImg&&box){
    // PDF - show note in box
    var note=box.querySelector('.pb-pdf');
    if(!note){note=document.createElement('div');note.className='pb-pdf';note.style.cssText='color:var(--green);padding:0 14px;font-size:13px;';box.appendChild(note);}
    note.innerHTML='&#128206; Fisier salvat';
  }
  if(ph)ph.style.display='none';
  var hf=document.getElementById('hf_'+sfx);
  if(hf)hf.value=data;
  // Show remove button
  var container=box&&box.parentNode;
  if(container){
    var existing=container.querySelector('.pbr');
    if(!existing){
      var rb=document.createElement('button');rb.className='pbr';rb.innerHTML='&#10005; Sterge poza';
      rb.onclick=function(){rmFile(sfx);};
      container.appendChild(rb);
    }
  }
}
function rmFile(sfx){
  var pi=document.getElementById('pi_'+sfx);
  var ph=document.getElementById('ph_'+sfx);
  var box=document.getElementById('pb_'+sfx);
  if(pi){pi.src='';pi.style.display='none';}
  if(ph)ph.style.display='flex';
  if(box){var note=box.querySelector('.pb-pdf');if(note)note.remove();}
  var hf=document.getElementById('hf_'+sfx);
  if(hf)hf.value='';
  // Remove the remove button
  var container=box&&box.parentNode;
  if(container){var rb=container.querySelector('.pbr');if(rb)rb.remove();}
}

/* EXPIRY PREVIEW */
function calcPrevAll(sid,mid,pid){
  var s=document.getElementById(sid),m=document.getElementById(mid),p=document.getElementById(pid);
  if(!s||!m||!p||!s.value){if(p)p.innerHTML='';return;}
  var d=new Date(s.value);d.setMonth(d.getMonth()+parseInt(m.value||12));
  var dl2=Math.ceil((d-new Date().setHours(0,0,0,0))/864e5);
  var col=dl2<0?'var(--red)':dl2<=30?'var(--amber)':'var(--green)';
  p.innerHTML='Expira: <b>'+d.toLocaleDateString('ro-RO',{day:'2-digit',month:'short',year:'numeric'})+'</b> &mdash; <span style="color:'+col+'">'+(dl2<0?'Exp. '+Math.abs(dl2)+'z':dl2===0?'Azi!':dl2+'z')+'</span>';
}
function calcPrev(el){
  // Find the prefix from the element's ID
  var id=el.id;
  var prefix=id.substring(0,id.lastIndexOf('_'));
  calcPrevAll(prefix+'_s',prefix+'_m',prefix+'_p');
}
function calcRev(){
  var last=parseInt(document.getElementById('rv_l').value)||0;
  var cur=parseInt(document.getElementById('rv_c').value)||0;
  var iv=parseInt(document.getElementById('rv_i').value)||10000;
  var p=document.getElementById('rv_p');if(!p)return;
  if(!last){p.innerHTML='';return;}
  var nxt=last+iv,left=nxt-cur;
  p.innerHTML='Urm. la <b>'+nxt.toLocaleString('ro-RO')+' km</b> &mdash; '+(left>0?'<b>'+left.toLocaleString('ro-RO')+' km</b>':'<span style="color:var(--red)">dep. '+Math.abs(left).toLocaleString('ro-RO')+' km</span>');
}

/* ADD CAR */
function openAdd(){
  var html='<div class="sheet-hd"><span>Masina noua</span><button class="xbtn" onclick="closeSheet()">&#10005;</button></div><div class="body" id="abody"></div><button class="prim" onclick="saveAdd()">Salveaza masina</button>';
  openSheet(html);
  var body=document.getElementById('abody');
  // Name + plate
  body.innerHTML+='<div class="row"><div class="f"><label>Marca / Model</label><input class="inp" type="text" id="fn" placeholder="ex: BMW E36"></div><div class="f"><label>Numar inmatr.</label><input class="inp" type="text" id="fp" placeholder="ex: B 01 ABC"></div></div>';
  // Photo
  var fpf=document.createElement('div');fpf.className='f';fpf.innerHTML='<label>Poza masina</label>';
  makePhotoBox('','car',fpf);body.appendChild(fpf);
  // Docs
  body.innerHTML+='<div class="sec">Documente</div>';
  body.innerHTML+='<div class="row"><div class="f"><label>ITP &mdash; Data</label><input class="inp" type="date" id="itp_s" oninput="calcPrev(this)"></div><div class="f"><label>Valabilitate</label><select class="inp" id="itp_m" oninput="calcPrev(this)">'+perOpts(12)+'</select></div></div><div class="prev" id="itp_p"></div>';
  body.innerHTML+='<div class="row"><div class="f"><label>RCA &mdash; Data</label><input class="inp" type="date" id="rca_s" oninput="calcPrev(this)"></div><div class="f"><label>Valabilitate</label><select class="inp" id="rca_m" oninput="calcPrev(this)">'+perOpts(12)+'</select></div></div><div class="prev" id="rca_p"></div>';
  body.innerHTML+='<div class="row"><div class="f"><label>Rovinieta &mdash; Data</label><input class="inp" type="date" id="rov_s" oninput="calcPrev(this)"></div><div class="f"><label>Valabilitate</label><select class="inp" id="rov_m" oninput="calcPrev(this)">'+perOpts(3)+'</select></div></div><div class="prev" id="rov_p"></div>';
  // Revizie
  body.innerHTML+='<div class="sec">Revizie (km)</div><div class="row"><div class="f"><label>Ultima revizie la</label><input class="inp" type="number" id="rv_l" placeholder="ex: 110000" oninput="calcRev()"></div><div class="f"><label>Km actuali</label><input class="inp" type="number" id="rv_c" placeholder="ex: 115000" oninput="calcRev()"></div></div><div class="f"><label>Interval (km)</label><input class="inp" type="number" id="rv_i" value="10000" oninput="calcRev()"></div><div class="prev" id="rv_p"></div>';
  // Files
  body.innerHTML+='<div class="sec">Fisiere documente</div>';
  var f1=document.createElement('div');f1.className='f';f1.innerHTML='<label>RCA &mdash; Fisier/Poza</label>';makePhotoBox('','f_rca',f1);body.appendChild(f1);
  var f2=document.createElement('div');f2.className='f';f2.innerHTML='<label>Carte masina</label>';makePhotoBox('','f_carte',f2);body.appendChild(f2);
  var f3=document.createElement('div');f3.className='f';f3.innerHTML='<label>Talon masina</label>';makePhotoBox('','f_talon',f3);body.appendChild(f3);
}
function saveAdd(){
  var name=(document.getElementById('fn').value||'').trim();
  if(!name){alert('Introdu marca/modelul');return;}
  function gd(sk,mk){var s=document.getElementById(sk).value||'',m=parseInt(document.getElementById(mk).value||12);return s?{sd:s,mo:m,ex:am(s,m)}:{sd:'',mo:m,ex:''};}
  var car={id:Date.now(),name:name,
    plate:(document.getElementById('fp').value||'').trim(),
    photo:document.getElementById('hf_car').value||'',
    docs:{
      itp:gd('itp_s','itp_m'),rca:gd('rca_s','rca_m'),rovinieta:gd('rov_s','rov_m'),
      revizie:{lk:document.getElementById('rv_l').value||'',ck:document.getElementById('rv_c').value||'',iv:document.getElementById('rv_i').value||'10000'},
      files:{rca:document.getElementById('hf_f_rca').value||'',carte:document.getElementById('hf_f_carte').value||'',talon:document.getElementById('hf_f_talon').value||''}
    }
  };
  cars.push(car);exp[car.id]=true;save();closeSheet();render();
}

/* EDIT CAR */
function editCar(id){
  var car=cars.find(function(c){return c.id===id;});if(!car)return;
  var d=car.docs||{};
  var itp=d.itp||{},rca=d.rca||{},rov=d.rovinieta||{},rev=d.revizie||{},files=d.files||{};
  var html='<div class="sheet-hd"><span>Editeaza masina</span><button class="xbtn" onclick="closeSheet()">&#10005;</button></div><div class="body" id="ebody"></div><button class="prim" onclick="saveEdit('+id+')">Salveaza</button>';
  openSheet(html);
  var body=document.getElementById('ebody');
  // Name + plate
  body.innerHTML='<div class="row"><div class="f"><label>Marca / Model</label><input class="inp" type="text" id="fen" value="'+car.name+'"></div><div class="f"><label>Numar inmatr.</label><input class="inp" type="text" id="fep" value="'+(car.plate||'')+'"></div></div>';
  // Photo
  var fpf=document.createElement('div');fpf.className='f';fpf.innerHTML='<label>Poza masina</label>';
  makePhotoBox(car.photo||'','car',fpf);body.appendChild(fpf);
  // Docs
  body.innerHTML+='<div class="sec">Documente</div>';
  body.innerHTML+='<div class="row"><div class="f"><label>ITP &mdash; Data</label><input class="inp" type="date" id="itp_s" value="'+(itp.sd||'')+'" oninput="calcPrev(this)"></div><div class="f"><label>Valabilitate</label><select class="inp" id="itp_m" oninput="calcPrev(this)">'+perOpts(itp.mo||12)+'</select></div></div><div class="prev" id="itp_p"></div>';
  body.innerHTML+='<div class="row"><div class="f"><label>RCA &mdash; Data</label><input class="inp" type="date" id="rca_s" value="'+(rca.sd||'')+'" oninput="calcPrev(this)"></div><div class="f"><label>Valabilitate</label><select class="inp" id="rca_m" oninput="calcPrev(this)">'+perOpts(rca.mo||12)+'</select></div></div><div class="prev" id="rca_p"></div>';
  body.innerHTML+='<div class="row"><div class="f"><label>Rovinieta &mdash; Data</label><input class="inp" type="date" id="rov_s" value="'+(rov.sd||'')+'" oninput="calcPrev(this)"></div><div class="f"><label>Valabilitate</label><select class="inp" id="rov_m" oninput="calcPrev(this)">'+perOpts(rov.mo||3)+'</select></div></div><div class="prev" id="rov_p"></div>';
  // Revizie
  body.innerHTML+='<div class="sec">Revizie (km)</div><div class="row"><div class="f"><label>Ultima revizie la</label><input class="inp" type="number" id="rv_l" value="'+(rev.lk||'')+'" placeholder="ex: 110000" oninput="calcRev()"></div><div class="f"><label>Km actuali</label><input class="inp" type="number" id="rv_c" value="'+(rev.ck||'')+'" placeholder="ex: 115000" oninput="calcRev()"></div></div><div class="f"><label>Interval (km)</label><input class="inp" type="number" id="rv_i" value="'+(rev.iv||'10000')+'" oninput="calcRev()"></div><div class="prev" id="rv_p"></div>';
  // Files
  body.innerHTML+='<div class="sec">Fisiere documente</div>';

function plGetCar(){ return PL.data.cars.find(function(c){return c.id===PL.carId;}); }

function plGetSub(cat){ return (cat&&cat.subs||[]).find(function(s){return s.id===PL.subId;}); }

function plTasksForSub(sub){

function plSaveCar(color){
  var name=(document.getElementById('pl-cn').value||'').trim();
  if(!name){alert('Introdu denumirea mașinii');return;}
  if(_plEditCarId){
    var car=PL.data.cars.find(function(c){return c.id===_plEditCarId;});
    if(car){car.name=name;car.brand=document.getElementById('pl-cm').value||'';car.model=document.getElementById('pl-cmo').value||'';car.year=document.getElementById('pl-cy').value||'';car.color=color;}
  } else {
    var newCar={id:plId(),name:name,brand:document.getElementById('pl-cm').value||'',model:document.getElementById('pl-cmo').value||'',year:document.getElementById('pl-cy').value||'',color:color,categories:JSON.parse(JSON.stringify(PL_DEFAULT_CATS))};
    newCar.categories.forEach(function(cat){cat.id=plId();cat.subs.forEach(function(s){s.id=plId();s.tasks=[];});});
    PL.data.cars.push(newCar);
  }
  plSave();plRender();
}

function plRenderTasksTab(root,car,allTasks){
  // Search
  var srch=document.createElement('div');srch.className='pl-search';
  srch.innerHTML='<span class="pl-search-ic">&#128269;</span><input placeholder="Caută tasks..." value="'+PL.taskSearch+'" id="pl-srch">';
  srch.querySelector('input').oninput=function(){PL.taskSearch=this.value;plRender();};
  root.appendChild(srch);
  // Filters
  var filters=document.createElement('div');filters.className='pl-filters';
  [['all','Toate'],['waiting','Așteptare'],['inprogress','În lucru'],['done','Finalizate']].forEach(function(f){
    var btn=document.createElement('button');btn.className='pl-filter'+(PL.taskFilter===f[0]?' active':'');btn.textContent=f[1];
    btn.onclick=function(){PL.taskFilter=f[0];plRender();};
    filters.appendChild(btn);
  });
  root.appendChild(filters);
  // Tasks
  var filtered=allTasks.filter(function(t){
    if(PL.taskFilter!=='all'&&t.status!==PL.taskFilter) return false;
    if(PL.taskSearch&&t.name.toLowerCase().indexOf(PL.taskSearch.toLowerCase())<0) return false;
    return true;
  });
  if(!filtered.length){
    var empty=document.createElement('div');empty.className='pl-empty';
    empty.innerHTML='<div class="pl-empty-ic">📋</div><p>Niciun task<br><small>Apasă + pentru a adăuga un task</small></p>';
    root.appendChild(empty);return;
  }
  filtered.forEach(function(task){
    var row=document.createElement('div');row.className='pl-task-row';
    var isDone=task.status==='done';
    var statusLabels={waiting:'Așteptare',inprogress:'În lucru',done:'Finalizat'};
    var statusClass={waiting:'waiting',inprogress:'inprogress',done:'done-s'};
    row.innerHTML='<div class="pl-task-check'+(isDone?' done':'')+'">  '+(isDone?'&#10003;':'')+'</div>'+
      '<div class="pl-task-info"><div class="pl-task-name'+(isDone?' done':'')+'">'+task.name+'</div>'+

}

/* ── SUBTASK LIST (overlay) ── */
function plOpenSubTasks(car,cat,sub){
  var tasks=sub?plTasksForSub(sub):plTasksForCat(cat);
  var root=document.getElementById('pl-root');
  var ov=document.createElement('div');ov.className='pl-overlay';ov.id='pl-ov';
  plLock();
  var sheet=document.createElement('div');sheet.className='pl-sheet';
  sheet.style.paddingBottom='24px';
  var hdl=document.createElement('div');hdl.className='pl-sh';sheet.appendChild(hdl);
  var hd=document.createElement('div');hd.className='pl-sheet-hd';
  var xb=document.createElement('button');xb.className='pl-sheet-x';xb.innerHTML='&#10005;';
  xb.onclick=function(){plClose(ov);};
  var title=document.createElement('span');title.className='pl-sheet-title';title.textContent=sub?sub.name:'Toate taskurile';
  var add=document.createElement('button');add.className='pl-sheet-save';add.textContent='+ Task';
  add.onclick=function(){plClose(ov);plOpenAddTask(car,cat,sub);};
  hd.appendChild(xb);hd.appendChild(title);hd.appendChild(add);sheet.appendChild(hd);

  // Tasks section
  if(!tasks.length){
    var empty=document.createElement('div');empty.className='pl-empty';
    empty.innerHTML='<div class="pl-empty-ic">&#128203;</div><p>Niciun task</p>';
    sheet.appendChild(empty);
  } else {
    tasks.forEach(function(task){
      var row=document.createElement('div');row.className='pl-task-row';
      row.style.margin='0 16px 8px';
      var isDone=task.status==='done';
      var chk=document.createElement('div');chk.className='pl-task-check'+(isDone?' done':'');
      chk.innerHTML=isDone?'&#10003;':'';
      chk.onclick=function(){task.status=isDone?'waiting':'done';plSave();plClose(ov);plRender();};
      var info=document.createElement('div');info.className='pl-task-info';
      info.innerHTML='<div class="pl-task-name'+(isDone?' done':'')+'">'+task.name+'</div>'+
        (task.note?'<div class="pl-task-meta">'+task.note+'</div>':'');
      row.appendChild(chk);row.appendChild(info);
      row.onclick=function(){plOpenEditTask(car,task);};
      sheet.appendChild(row);
    });
  }

  // Photos & Links section (only for specific subcategory, not "Toate")
  if(sub){
    var photos=sub.photos||[];
    var links=sub.links||[];

    var mediaHd=document.createElement('div');
    mediaHd.style.cssText='font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;padding:16px 16px 8px;border-top:0.5px solid var(--border);margin-top:8px;display:flex;align-items:center;justify-content:space-between;';
    mediaHd.innerHTML='<span>POZE & LINKURI</span>';
    var mediaAddBtns=document.createElement('div');mediaAddBtns.style.cssText='display:flex;gap:8px;';

    // Add photo button
    var addPhotoBtn=document.createElement('button');
    addPhotoBtn.style.cssText='font-size:12px;font-weight:600;color:var(--pl-blue);background:none;border:none;cursor:pointer;font-family:inherit;';
    addPhotoBtn.innerHTML='&#128247; Poza';
    addPhotoBtn.onclick=function(){
      var fi=document.getElementById('fi');
      fi.onchange=function(){
        if(!fi.files||!fi.files[0])return;
        var reader=new FileReader();
        var file=fi.files[0];
        reader.onload=function(e){
          var img=new Image();
          img.onload=function(){
            var mw=800,mh=600,w=img.width,h=img.height;
            if(w>mw){h=Math.round(h*mw/w);w=mw;}
            if(h>mh){w=Math.round(w*mh/h);h=mh;}
            var cv=document.createElement('canvas');cv.width=w;cv.height=h;
            cv.getContext('2d').drawImage(img,0,0,w,h);
            if(!sub.photos)sub.photos=[];
            sub.photos.push({id:plId(),data:cv.toDataURL('image/jpeg',0.82),added:Date.now()});
            plSave();plClose(ov);
            PL.subId=sub.id;plOpenSubTasks(car,cat,sub);
          };
          img.src=e.target.result;
        };
        reader.readAsDataURL(file);
      };
      fi.value='';fi.accept='image/*';fi.click();
    };

    // Add link button
    var addLinkBtn=document.createElement('button');
    addLinkBtn.style.cssText='font-size:12px;font-weight:600;color:var(--pl-blue);background:none;border:none;cursor:pointer;font-family:inherit;';
    addLinkBtn.innerHTML='&#128279; Link';
    addLinkBtn.onclick=function(){plOpenAddLink(car,cat,sub,ov);};

    mediaAddBtns.appendChild(addPhotoBtn);mediaAddBtns.appendChild(addLinkBtn);
    mediaHd.appendChild(mediaAddBtns);
    sheet.appendChild(mediaHd);

    // Photo grid
    if(photos.length){
      var photoGrid=document.createElement('div');
      photoGrid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 12px;';
      photos.forEach(function(ph){
        var imgWrap=document.createElement('div');imgWrap.style.cssText='position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;';
        var img=document.createElement('img');img.src=ph.data;img.style.cssText='width:100%;height:100%;object-fit:cover;cursor:pointer;';
        img.onclick=function(){plOpenPhoto(ph.data,function(){sub.photos=sub.photos.filter(function(p){return p.id!==ph.id;});plSave();plClose(ov);PL.subId=sub.id;plOpenSubTasks(car,cat,sub);});};
        imgWrap.appendChild(img);
        photoGrid.appendChild(imgWrap);
      });
      sheet.appendChild(photoGrid);
    }

    // Links list
    if(links.length){
      var linkList=document.createElement('div');linkList.style.cssText='padding:0 16px 12px;display:flex;flex-direction:column;gap:6px;';
      links.forEach(function(lk){
        var lrow=document.createElement('div');lrow.style.cssText='background:var(--bg3);border-radius:var(--rsm);padding:10px 12px;display:flex;align-items:center;gap:10px;';
        lrow.innerHTML='<span style="font-size:16px">&#128279;</span><a href="'+lk.url+'" target="_blank" style="flex:1;font-size:13px;color:var(--pl-blue);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(lk.title||lk.url)+'</a>';
        var delLk=document.createElement('button');delLk.style.cssText='background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;flex-shrink:0;';
        delLk.innerHTML='&#10005;';
        delLk.onclick=function(){sub.links=sub.links.filter(function(l){return l.id!==lk.id;});plSave();plClose(ov);PL.subId=sub.id;plOpenSubTasks(car,cat,sub);};
        lrow.appendChild(delLk);
        linkList.appendChild(lrow);
      });
      sheet.appendChild(linkList);
    }

    if(!photos.length&&!links.length){
      var noMedia=document.createElement('div');noMedia.style.cssText='text-align:center;padding:16px;color:var(--text3);font-size:13px;';
      noMedia.textContent='Nicio poza sau link adaugat';
      sheet.appendChild(noMedia);
    }
  }

  ov.appendChild(sheet);
  ov.onclick=function(e){if(e.target===ov){plClose(ov);}};
  root.appendChild(ov);
}

function plOpenPhoto(dataSrc, onDelete){

  ov.style.cssText='position:fixed;inset:0;z-index:60;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;';
  var img=document.createElement('img');img.src=dataSrc;img.style.cssText='max-width:95%;max-height:75vh;object-fit:contain;border-radius:8px;';

  var delBtn=document.createElement('button');delBtn.style.cssText='padding:10px 24px;background:rgba(255,59,48,0.8);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;';delBtn.textContent='Sterge';

/* ── ADD/EDIT TASK ── */
function plOpenAddTask(car,cat,sub){
  var root=document.getElementById('pl-root');
  var ov=document.createElement('div');ov.className='pl-overlay';ov.id='pl-ov';plLock();
  var sheet=document.createElement('div');sheet.className='pl-sheet';
  var selStatus='waiting';
  var hd=document.createElement('div');hd.className='pl-sheet-hd';
  var xb=document.createElement('button');xb.className='pl-sheet-x';xb.innerHTML='&#10005;';xb.onclick=function(){plClose(ov);};
  var title=document.createElement('span');title.className='pl-sheet-title';title.textContent='Task nou';
  var save=document.createElement('button');save.className='pl-sheet-save';save.textContent='Salvează';
  hd.appendChild(xb);hd.appendChild(title);hd.appendChild(save);sheet.appendChild(hd);

  // Cat/Sub selector if none passed
  var catSel=cat,subSel=sub;
  var form=document.createElement('div');form.className='pl-form';

  // Category selector
  if(!cat){
    var fcat=document.createElement('div');fcat.className='pl-field';
    fcat.innerHTML='<label>Categorie</label>';
    var sel=document.createElement('select');sel.className='pl-inp';sel.id='pl-tcat';
    (car.categories||[]).forEach(function(c){
      var opt=document.createElement('option');opt.value=c.id;opt.textContent=c.name;sel.appendChild(opt);
    });
    sel.onchange=function(){
      catSel=car.categories.find(function(c){return c.id===sel.value;});
      var subsel=document.getElementById('pl-tsub');
      if(subsel){subsel.innerHTML='';(catSel.subs||[]).forEach(function(s){var o=document.createElement('option');o.value=s.id;o.textContent=s.name;subsel.appendChild(o);});}
    };
    fcat.appendChild(sel);form.appendChild(fcat);
    catSel=car.categories[0];

    var fsub=document.createElement('div');fsub.className='pl-field';
    fsub.innerHTML='<label>Subcategorie</label>';
    var ssel=document.createElement('select');ssel.className='pl-inp';ssel.id='pl-tsub';
    (catSel&&catSel.subs||[]).forEach(function(s){var o=document.createElement('option');o.value=s.id;o.textContent=s.name;ssel.appendChild(o);});
    ssel.onchange=function(){subSel=(catSel.subs||[]).find(function(s){return s.id===ssel.value;});};
    fsub.appendChild(ssel);form.appendChild(fsub);
    subSel=catSel&&catSel.subs&&catSel.subs[0];
  }

  form.innerHTML+='<div class="pl-field"><label>Denumire *</label><input class="pl-inp" id="pl-tn" placeholder="Ex: Schimb ulei..."></div>'+
    '<div class="pl-field"><label>Notă</label><input class="pl-inp" id="pl-tnote" placeholder="Detalii..."></div>'+
    '<div class="pl-field"><label>Status</label><div class="pl-task-status-sel" id="pl-tstat">'+
    '<button class="pl-status-btn sel" data-s="waiting">Așteptare</button>'+
    '<button class="pl-status-btn" data-s="inprogress">În lucru</button>'+
    '<button class="pl-status-btn" data-s="done">Finalizat</button>'+
    '</div></div>';
  sheet.appendChild(form);

  setTimeout(function(){
    document.querySelectorAll('#pl-tstat .pl-status-btn').forEach(function(b){
      b.onclick=function(){
        selStatus=b.dataset.s;
        document.querySelectorAll('#pl-tstat .pl-status-btn').forEach(function(x){x.classList.remove('sel');});
        b.classList.add('sel');
      };
    });
  },10);

  save.onclick=function(){
    var name=(document.getElementById('pl-tn').value||'').trim();
    if(!name){alert('Introdu denumirea taskului');return;}
    var tcat=catSel||car.categories[0];
    var csub=document.getElementById('pl-tsub');
    if(csub) subSel=(tcat.subs||[]).find(function(s){return s.id===csub.value;})||tcat.subs[0];
    var targetSub=subSel||(tcat&&tcat.subs&&tcat.subs[0]);
    if(!targetSub){alert('Selectează o subcategorie');return;}
    if(!targetSub.tasks) targetSub.tasks=[];
    targetSub.tasks.push({id:plId(),name:name,note:document.getElementById('pl-tnote').value||'',status:selStatus,created:Date.now()});
    plSave();plClose(ov);plRender();
  };

  ov.appendChild(sheet);ov.onclick=function(e){if(e.target===ov){plClose(ov);}};
  root.appendChild(ov);
}

function plOpenEditTask(car,task){
  var root=document.getElementById('pl-root');

  sheet.appendChild(form);

  // Delete button
  var delBtn=document.createElement('button');

  delBtn.innerHTML='🗑️ Șterge task';
  delBtn.onclick=function(){

    plSave();plClose(ov);plRender();
  };
  sheet.appendChild(delBtn);

  setTimeout(function(){
    document.querySelectorAll('#pl-etstat .pl-status-btn').forEach(function(b){
      b.onclick=function(){
        selStatus=b.dataset.s;
        document.querySelectorAll('#pl-etstat .pl-status-btn').forEach(function(x){x.classList.remove('sel');});
        b.classList.add('sel');
      };
    });
  },10);

  save.onclick=function(){
    var name=(document.getElementById('pl-etn').value||'').trim();
    if(!name)return;
    task.name=name;task.note=document.getElementById('pl-etnote').value||'';task.status=selStatus;
    plSave();plClose(ov);plRender();
  };
  ov.appendChild(sheet);ov.onclick=function(e){if(e.target===ov){plClose(ov);}};
  root.appendChild(ov);
}

/* ── ADD/EDIT CATEGORY ── */
function plOpenAddCategory(car){
  var root=document.getElementById('pl-root');
  var ov=document.createElement('div');ov.className='pl-overlay';ov.id='pl-ov';plLock();
  var sheet=document.createElement('div');sheet.className='pl-sheet';
  var selIcon=PL_ICONS[0];
  var hd=document.createElement('div');hd.className='pl-sheet-hd';
  var xb=document.createElement('button');xb.className='pl-sheet-x';xb.innerHTML='&#10005;';xb.onclick=function(){plClose(ov);};
  var title=document.createElement('span');title.className='pl-sheet-title';title.textContent='Categorie nouă';
  var save=document.createElement('button');save.className='pl-sheet-save';save.textContent='Salvează';
  hd.appendChild(xb);hd.appendChild(title);hd.appendChild(save);sheet.appendChild(hd);

  var form=document.createElement('div');form.className='pl-form';
  form.innerHTML='<div class="pl-field"><label>Nume *</label><input class="pl-inp" id="pl-catn" placeholder="Ex: Electrica, Suspensie..."></div>'+
    '<div class="pl-field"><label>Iconiță</label></div>';
  sheet.appendChild(form);

  // Preview
  var prev=document.createElement('div');prev.className='pl-preview-row';
  prev.innerHTML='<div class="pl-preview-ic" id="pl-prev-ic">'+selIcon+'</div><span class="pl-preview-name" id="pl-prev-name">Previzualizare</span>';
  sheet.appendChild(prev);

  // Icon grid
  var grid=document.createElement('div');grid.className='pl-icon-grid';
  PL_ICONS.forEach(function(ic,idx){
    var btn=document.createElement('button');btn.className='pl-ic-btn'+(idx===0?' sel':'');btn.textContent=ic;
    btn.onclick=function(){
      selIcon=ic;
      document.querySelectorAll('.pl-ic-btn').forEach(function(b){b.classList.remove('sel');});
      btn.classList.add('sel');
      var pi=document.getElementById('pl-prev-ic');if(pi)pi.textContent=ic;
    };
    grid.appendChild(btn);
  });
  sheet.appendChild(grid);

  save.onclick=function(){
    var name=(document.getElementById('pl-catn').value||'').trim();
    if(!name){alert('Introdu numele categoriei');return;}
    var newCat={id:plId(),name:name,icon:selIcon,subs:[]};
    if(!car.categories) car.categories=[];
    car.categories.push(newCat);
    plSave();plClose(ov);plRender();
  };

  ov.appendChild(sheet);ov.onclick=function(e){if(e.target===ov){plClose(ov);}};
  root.appendChild(ov);
}

function plOpenEditCategory(car,cat){
  var root=document.getElementById('pl-root');
  var ov=document.createElement('div');ov.className='pl-overlay';ov.id='pl-ov';plLock();
  var sheet=document.createElement('div');sheet.className='pl-sheet';
  var selIcon=cat.icon||PL_ICONS[0];
  var hd=document.createElement('div');hd.className='pl-sheet-hd';
  var xb=document.createElement('button');xb.className='pl-sheet-x';xb.innerHTML='&#10005;';xb.onclick=function(){plClose(ov);};
  var title=document.createElement('span');title.className='pl-sheet-title';title.textContent='Editează categoria';
  var save=document.createElement('button');save.className='pl-sheet-save';save.textContent='Salvează';
  hd.appendChild(xb);hd.appendChild(title);hd.appendChild(save);sheet.appendChild(hd);

  var form=document.createElement('div');form.className='pl-form';
  form.innerHTML='<div class="pl-field"><label>Nume *</label><input class="pl-inp" id="pl-ecatn" value="'+cat.name+'"></div>'+
    '<div class="pl-field"><label>Iconiță</label></div>';
  sheet.appendChild(form);

  var prev=document.createElement('div');prev.className='pl-preview-row';
  prev.innerHTML='<div class="pl-preview-ic" id="pl-prev-ic">'+selIcon+'</div><span class="pl-preview-name">'+cat.name+'</span>';
  sheet.appendChild(prev);

  var grid=document.createElement('div');grid.className='pl-icon-grid';
  PL_ICONS.forEach(function(ic){
    var btn=document.createElement('button');btn.className='pl-ic-btn'+(ic===selIcon?' sel':'');btn.textContent=ic;
    btn.onclick=function(){
      selIcon=ic;
      document.querySelectorAll('.pl-ic-btn').forEach(function(b){b.classList.remove('sel');});
      btn.classList.add('sel');
      var pi=document.getElementById('pl-prev-ic');if(pi)pi.textContent=ic;
    };
    grid.appendChild(btn);
  });
  sheet.appendChild(grid);

  // Delete category
  var delBtn=document.createElement('button');
  delBtn.style.cssText='margin:8px 20px 0;padding:12px;background:#fff0f0;color:var(--pl-red);border:none;border-radius:10px;width:calc(100% - 40px);font-size:14px;cursor:pointer;font-family:inherit;';
  delBtn.innerHTML='🗑️ Șterge categoria';
  delBtn.onclick=function(){
    car.categories=car.categories.filter(function(c){return c.id!==cat.id;});
    plSave();plClose(ov);PL.view='car';PL.taskTab='categories';plRender();
  };
  sheet.appendChild(delBtn);

  save.onclick=function(){
    var name=(document.getElementById('pl-ecatn').value||'').trim();
    if(!name)return;
    cat.name=name;cat.icon=selIcon;
    plSave();plClose(ov);plRender();
  };
  ov.appendChild(sheet);ov.onclick=function(e){if(e.target===ov){plClose(ov);}};
  root.appendChild(ov);
}

/* ── HELPERS ── */
function plClose(ov){
  if(ov&&ov.parentNode) ov.remove();
  var pp=document.getElementById('page-planner');
  if(pp) pp.style.overflow='';
}
function plLock(){
  var pp=document.getElementById('page-planner');
  if(pp) pp.style.overflow='hidden';
}

/* ── INIT ── */
function plInit(){
  plLoad();plRender();
}
