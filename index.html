<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DocAuto">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<title>DocAuto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f0;--text2:#888;--text3:#555;--green:#4ade80;--green-bg:rgba(74,222,128,0.1);--amber:#fb923c;--amber-bg:rgba(251,146,60,0.1);--red:#f87171;--red-bg:rgba(248,113,113,0.1);--accent:#e8e8e8;--at:#000;--radius:14px;--rsm:8px;}
body.light{--bg:#f5f5f0;--bg2:#fff;--bg3:#eeede8;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#111;--text2:#666;--text3:#aaa;--green:#16a34a;--green-bg:rgba(22,163,74,0.1);--amber:#d97706;--amber-bg:rgba(217,119,6,0.1);--red:#dc2626;--red-bg:rgba(220,38,38,0.1);--accent:#111;--at:#fff;}
body.light .topbar{background:rgba(245,245,240,0.95);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:50;background:rgba(15,15,15,0.95);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:20px;font-weight:600;letter-spacing:-0.3px;}
.topbar p{font-size:11px;color:var(--text2);margin-top:1px;}
.topbar-r{display:flex;align-items:center;gap:8px;}
.tbtn{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s;}
.tbtn:active{transform:scale(0.92);}
.fab{width:40px;height:40px;border-radius:50%;background:var(--accent);color:var(--at);border:none;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.15s;}
.fab:active{transform:scale(0.92);}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 16px 10px;}
.pill{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rsm);padding:10px 12px;display:flex;flex-direction:column;gap:2px;}
.pill .n{font-size:22px;font-weight:600;line-height:1;}
.pill .l{font-size:10px;color:var(--text2);}
.n-ok{color:var(--green)}.n-warn{color:var(--amber)}.n-danger{color:var(--red)}
.cars{padding:4px 16px 100px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.card-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background 0.1s;}
.card-hd:hover{background:var(--bg3);}
.thumb{width:52px;height:52px;border-radius:10px;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb-ph{font-size:18px;font-weight:600;color:var(--text2);}
.cm{flex:1;min-width:0;}
.cn{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cp{font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);margin-top:3px;background:var(--bg3);border-radius:4px;padding:1px 6px;display:inline-block;}
.cr{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.dot{width:9px;height:9px;border-radius:50%;}
.dot-ok{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot-warn{background:var(--amber);box-shadow:0 0 6px var(--amber);}
.dot-danger{background:var(--red);box-shadow:0 0 6px var(--red);}
.chev{color:var(--text3);font-size:12px;transition:transform 0.2s;}
.chev.open{transform:rotate(180deg);}
.docs{border-top:0.5px solid var(--border);}
.dr{display:flex;align-items:center;padding:12px 16px;border-bottom:0.5px solid var(--border);gap:12px;cursor:pointer;transition:background 0.1s;}
.dr:last-child{border-bottom:none;}
.dr:hover{background:var(--bg3);}
.db{font-size:10px;font-weight:600;letter-spacing:0.05em;padding:3px 8px;border-radius:5px;flex-shrink:0;min-width:72px;text-align:center;}
.ok{background:var(--green-bg);color:var(--green);}
.warn{background:var(--amber-bg);color:var(--amber);}
.danger{background:var(--red-bg);color:var(--red);}
.dn{font-size:14px;font-weight:500;flex:1;}
.de{font-size:11px;color:var(--text2);flex-shrink:0;}
.dd{font-size:11px;flex-shrink:0;min-width:60px;text-align:right;}
.dd-ok{color:var(--green)}.dd-warn{color:var(--amber)}.dd-danger{color:var(--red)}
.card-ft{border-top:0.5px solid var(--border);display:flex;}
.card-ft button{flex:1;padding:12px;background:none;border:none;font-size:13px;cursor:pointer;transition:background 0.1s;color:var(--text2);}
.card-ft button:hover{background:var(--bg3);}
.del-btn{color:var(--red)!important;border-left:0.5px solid var(--border)!important;}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 32px;text-align:center;gap:12px;}
.empty-ic{font-size:56px;}
.empty h2{font-size:18px;font-weight:600;}
.empty p{font-size:14px;color:var(--text2);line-height:1.5;}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;animation:fi 0.18s ease;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{width:100%;background:var(--bg2);border-radius:20px 20px 0 0;border-top:0.5px solid var(--border2);padding-bottom:28px;animation:su 0.25s cubic-bezier(0.32,0.72,0,1);max-height:92vh;overflow-y:auto;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px;}
.sheet-hd{padding:8px 20px 16px;display:flex;align-items:center;justify-content:space-between;}
.sheet-hd span{font-size:17px;font-weight:600;}
.xbtn{background:var(--bg3);border:none;color:var(--text2);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.body{padding:0 20px 8px;display:flex;flex-direction:column;gap:14px;}
.f{display:flex;flex-direction:column;gap:5px;}
.f label{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.04em;text-transform:uppercase;}
.inp{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--rsm);padding:12px 14px;color:var(--text);font-size:15px;width:100%;font-family:inherit;}
.inp:focus{outline:none;border-color:rgba(255,255,255,0.35);}
body.light .inp:focus{border-color:rgba(0,0,0,0.4);}
input[type=date].inp{color-scheme:dark;}
body.light input[type=date].inp{color-scheme:light;}
select.inp{cursor:pointer;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sec{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding-top:4px;border-top:0.5px solid var(--border);}
.prim{margin:16px 20px 0;background:var(--accent);color:var(--at);border:none;border-radius:var(--rsm);padding:15px;font-size:15px;font-weight:600;width:calc(100% - 40px);cursor:pointer;transition:opacity 0.15s;font-family:inherit;}
.prim:hover{opacity:0.85;}
.prev{font-size:12px;color:var(--text2);line-height:1.6;min-height:16px;}
.pb{height:46px;border-radius:var(--rsm);background:var(--bg3);border:0.5px solid var(--border2);display:flex;align-items:center;overflow:hidden;cursor:pointer;transition:border-color 0.15s;}
.pb:hover{border-color:var(--text2);}
.pb img{width:46px;height:46px;object-fit:cover;flex-shrink:0;display:block;}
.pb-ph{display:flex;align-items:center;gap:8px;color:var(--text2);padding:0 14px;font-size:13px;width:100%;}
.pbr{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;padding:3px 0;font-family:inherit;}
</style>
</head>
<body>
<div class="topbar">
  <div><h1>DocAuto</h1><p>ITP &middot; RCA &middot; Rovinieta &middot; Revizie</p></div>
  <div class="topbar-r">
    <button class="tbtn" id="themeBtn" onclick="toggleTheme()">&#127769;</button>
    <button class="fab" onclick="openAdd()">+</button>
  </div>
</div>
<div class="summary" id="sum"></div>
<div class="cars" id="cars"></div>
<div id="ov" style="display:none;"></div>
<input type="file" id="fi" accept="image/*,application/pdf" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;" onchange="onFile(this)">

<script>
var SK='docauto_v8', cars=[], exp={}, _fsfx='car';
var DK=['itp','rca','rovinieta','revizie'];
var DL={itp:'ITP',rca:'RCA',rovinieta:'Rovinieta',revizie:'Revizie'};

function load(){
  try{cars=JSON.parse(localStorage.getItem(SK))||[];}catch(e){cars=[];}
  if(!cars.length) cars=[
    {id:1,name:'BMW E36',plate:'B 733 ETY',photo:'',docs:{
      itp:{sd:'2024-08-15',mo:12,ex:'2025-08-15'},
      rca:{sd:'2024-07-01',mo:12,ex:'2025-07-01'},
      rovinieta:{sd:'2025-01-01',mo:3,ex:'2025-04-01'},
      revizie:{lk:'110000',ck:'115000',iv:'10000'},
      files:{rca:'',carte:'',talon:''}}},
    {id:2,name:'Dacia Logan',plate:'IF 01 XYZ',photo:'',docs:{
      itp:{sd:'2025-11-20',mo:12,ex:'2026-11-20'},
      rca:{sd:'2025-06-15',mo:12,ex:'2026-06-15'},
      rovinieta:{sd:'2025-12-01',mo:12,ex:'2026-12-01'},
      revizie:{lk:'85000',ck:'89500',iv:'10000'},
      files:{rca:'',carte:'',talon:''}}}
  ];
}
function save(){try{localStorage.setItem(SK,JSON.stringify(cars));}catch(e){}}

function dl(d){if(!d)return null;var a=new Date(d);a.setHours(0,0,0,0);var b=new Date();b.setHours(0,0,0,0);return Math.ceil((a-b)/864e5);}
function stOf(d){if(d===null||d<0)return'danger';if(d<=30)return'warn';return'ok';}
function rkl(r){if(!r||!r.lk)return null;return(+r.lk||0)+(+r.iv||10000)-(+r.ck||0);}
function rst(r){var k=rkl(r);if(k===null||k<=0)return'danger';if(k<=1500)return'warn';return'ok';}
function rnk(r){if(!r||!r.lk)return null;return(+r.lk||0)+(+r.iv||10000);}
function cst(c){
  var w='ok';
  for(var i=0;i<DK.length;i++){var k=DK[i],s;
    if(k==='revizie')s=rst(c.docs&&c.docs.revizie);
    else s=stOf(dl(c.docs&&c.docs[k]&&c.docs[k].ex));
    if(s==='danger')return'danger';if(s==='warn')w='warn';}
  return w;
}
function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('ro-RO',{day:'2-digit',month:'short',year:'numeric'});}
function fk(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('ro-RO')+' km';}
function dl2(d){if(d===null)return'Necompletat';if(d<0)return'Exp.'+Math.abs(d)+'z';if(d===0)return'Azi!';if(d===1)return'Maine!';return d+'z';}
function bl(d){if(d===null)return'LIPSA';if(d<0)return'EXPIRAT';if(d<=30)return'EXPIRA';return'VALID';}
function am(ds,mo){var d=new Date(ds);d.setMonth(d.getMonth()+mo);return d.toISOString().split('T')[0];}

function renderSum(){
  var ok=0,w=0,d=0;
  cars.forEach(function(c){var s=cst(c);if(s==='ok')ok++;else if(s==='warn')w++;else d++;});
  document.getElementById('sum').innerHTML=
    '<div class="pill"><span class="n n-ok">'+ok+'</span><span class="l">Fara probleme</span></div>'+
    '<div class="pill"><span class="n n-warn">'+w+'</span><span class="l">Expira curand</span></div>'+
    '<div class="pill"><span class="n n-danger">'+d+'</span><span class="l">Probleme</span></div>';
}

function renderCars(){
  var el=document.getElementById('cars');
  if(!cars.length){el.innerHTML='<div class="empty"><div class="empty-ic">&#128663;</div><h2>Nicio masina</h2><p>Apasa + pentru a adauga prima masina.</p></div>';return;}
  el.innerHTML='';
  cars.forEach(function(car){
    var cs=cst(car),isOpen=!!exp[car.id];
    var div=document.createElement('div');div.className='card';
    var init=(car.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var thumbH=car.photo
      ?'<div class="thumb"><img src="'+car.photo+'" alt="'+car.name+'"></div>'
      :'<div class="thumb"><div class="thumb-ph">'+init+'</div></div>';
    var hd=document.createElement('div');hd.className='card-hd';
    hd.innerHTML=thumbH+'<div class="cm"><div class="cn">'+car.name+'</div><div class="cp">'+(car.plate||'fara numar')+'</div></div><div class="cr"><div class="dot dot-'+cs+'"></div><span class="chev'+(isOpen?' open':'')+'">&#9660;</span></div>';
    hd.onclick=function(){exp[car.id]=!exp[car.id];renderCars();};
    div.appendChild(hd);
    if(isOpen){
      var docsDiv=document.createElement('div');docsDiv.className='docs';
      // Doc rows
      DK.forEach(function(k){
        var row=document.createElement('div');row.className='dr';
        if(k==='revizie'){
          var r=car.docs&&car.docs.revizie||{};
          var st=rst(r),kl=rkl(r),nk=rnk(r);
          var badge=r.lk?(kl<=0?'DEPASIT':kl<=1500?'CURAND':'OK'):'LIPSA';
          var info=r.lk?'urm. '+fk(nk):'Necompletat';
          var ks=kl===null?'':(kl<=0?Math.abs(kl)+' km dep.':kl.toLocaleString('ro-RO')+' km');
          row.innerHTML='<span class="db '+st+'">'+badge+'</span><span class="dn">Revizie</span><span class="de">'+info+'</span><span class="dd dd-'+st+'">'+ks+'</span>';
          row.onclick=function(){editDoc(car.id,'revizie');};
        } else {
          var d=dl(car.docs&&car.docs[k]&&car.docs[k].ex),st=stOf(d);
          row.innerHTML='<span class="db '+st+'">'+bl(d)+'</span><span class="dn">'+DL[k]+'</span><span class="de">'+fd(car.docs&&car.docs[k]&&car.docs[k].ex)+'</span><span class="dd dd-'+st+'">'+dl2(d)+'</span>';
          (function(key){row.onclick=function(){editDoc(car.id,key);};})(k);
        }
        docsDiv.appendChild(row);
      });
      // File rows
      var fLabels={rca:'RCA',carte:'Carte masina',talon:'Talon masina'};
      Object.keys(fLabels).forEach(function(fk2){
        var fdata=car.docs&&car.docs.files&&car.docs.files[fk2];
        if(!fdata)return;
        var isImg=fdata.startsWith('data:image');
        var row=document.createElement('div');row.className='dr';
        row.innerHTML='<span class="db" style="background:var(--green-bg);color:var(--green);min-width:auto">&#128206;</span><span class="dn">'+fLabels[fk2]+'</span><span class="de" style="color:var(--green)">'+(isImg?'Poza':'PDF')+' salvat</span><span class="dd dd-ok">&#128065; Vezi</span>';
        (function(key,data,label){row.onclick=function(){viewFile(car.id,key,data,label);};})(fk2,fdata,fLabels[fk2]);
        docsDiv.appendChild(row);
      });
      div.appendChild(docsDiv);
      var ft=document.createElement('div');ft.className='card-ft';
      var eb=document.createElement('button');eb.innerHTML='&#9998; Editeaza';eb.onclick=function(){editCar(car.id);};
      var db2=document.createElement('button');db2.innerHTML='Sterge';db2.className='del-btn';db2.onclick=function(){delCar(car.id);};
      ft.appendChild(eb);ft.appendChild(db2);
      div.appendChild(ft);
    }
    el.appendChild(div);
  });
}

function render(){renderSum();renderCars();}
function delCar(id){if(!confirm('Stergi aceasta masina?'))return;cars=cars.filter(function(c){return c.id!==id;});delete exp[id];save();render();}

/* SHEET */
function openSheet(html){
  var ov=document.getElementById('ov');
  ov.style.display='flex';ov.className='overlay';
  ov.innerHTML='<div class="sheet"><div class="sh"></div>'+html+'</div>';
  ov.onclick=function(e){if(e.target===ov)closeSheet();};
}
function closeSheet(){var ov=document.getElementById('ov');ov.style.display='none';ov.innerHTML='';}

/* PERIOD SELECT */
function perOpts(sel){
  sel=sel||12;
  return [[3,'3 luni'],[6,'6 luni'],[12,'12 luni (1 an)'],[24,'24 luni (2 ani)']].map(function(p){
    return '<option value="'+p[0]+'"'+(sel==p[0]?' selected':'')+'>'+p[1]+'</option>';
  }).join('');
}

/* PHOTO BOX - built via DOM */
function makePhotoBox(photo, sfx, container){
  var hasPhoto=photo&&photo.length>0;
  var isImg=hasPhoto&&photo.startsWith('data:image');
  // Create a unique file input per box (most reliable cross-browser/iOS approach)
  var fi=document.createElement('input');
  fi.type='file';fi.id='fi_'+sfx;
  fi.accept='image/*,application/pdf';
  fi.style.cssText='position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2;';
  fi.onchange=function(){if(!fi.files||!fi.files[0])return;_fsfx=sfx;onFile(fi);};
  // Box
  var box=document.createElement('div');box.className='pb';box.id='pb_'+sfx;
  box.style.position='relative';
  box.appendChild(fi);
  if(hasPhoto&&isImg){
    var img=document.createElement('img');img.src=photo;img.id='pi_'+sfx;
    box.appendChild(img);
  } else {
    var img2=document.createElement('img');img2.id='pi_'+sfx;img2.style.display='none';
    box.appendChild(img2);
    if(hasPhoto&&!isImg){
      var pdfnote=document.createElement('div');
      pdfnote.style.cssText='color:var(--green);padding:0 14px;font-size:13px;';
      pdfnote.innerHTML='&#128206; Fisier salvat';
      box.appendChild(pdfnote);
    } else {
      var ph=document.createElement('div');ph.className='pb-ph';ph.id='ph_'+sfx;
      ph.innerHTML='<span>&#128247;</span> Apasa sa adaugi';
      box.appendChild(ph);
    }
  }
  container.appendChild(box);
  // Hidden field for value storage
  var hf=document.createElement('input');hf.type='hidden';hf.id='hf_'+sfx;hf.value=photo||'';
  container.appendChild(hf);
  // Remove button
  if(hasPhoto){
    var rb=document.createElement('button');rb.className='pbr';rb.innerHTML='&#10005; Sterge poza';
    rb.onclick=function(){rmFile(sfx);};
    container.appendChild(rb);
  }
}

/* FILE HANDLING */
function trigFile(sfx){_fsfx=sfx;var fi=document.getElementById('fi');fi.value='';fi.click();}
function onFile(inp){
  if(!inp.files||!inp.files[0])return;
  var file=inp.files[0],sfx=_fsfx;
  var reader=new FileReader();
  reader.onload=function(e){
    var data=e.target.result,isImg=file.type.startsWith('image/');
    if(sfx==='car'&&isImg){
      var img=new Image();
      img.onload=function(){
        var mw=600,mh=400,w=img.width,h=img.height;
        if(w>mw){h=Math.round(h*mw/w);w=mw;}
        if(h>mh){w=Math.round(w*mh/h);h=mh;}
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        applyFile(sfx,cv.toDataURL('image/jpeg',0.82),true);
      };
      img.onerror=function(){applyFile(sfx,data,isImg);};
      img.src=data;
    } else {
      applyFile(sfx,data,isImg);
    }
  };
  reader.readAsDataURL(file);
}
function applyFile(sfx,data,isImg){
  var pi=document.getElementById('pi_'+sfx);
  var ph=document.getElementById('ph_'+sfx);
  var box=document.getElementById('pb_'+sfx);
  if(pi&&isImg){pi.src=data;pi.style.display='block';}
  if(!isImg&&box){
    // PDF - show note in box
    var note=box.querySelector('.pb-pdf');
    if(!note){note=document.createElement('div');note.className='pb-pdf';note.style.cssText='color:var(--green);padding:0 14px;font-size:13px;';box.appendChild(note);}
    note.innerHTML='&#128206; Fisier salvat';
  }
  if(ph)ph.style.display='none';
  var hf=document.getElementById('hf_'+sfx);
  if(hf)hf.value=data;
  // Show remove button
  var container=box&&box.parentNode;
  if(container){
    var existing=container.querySelector('.pbr');
    if(!existing){
      var rb=document.createElement('button');rb.className='pbr';rb.innerHTML='&#10005; Sterge poza';
      rb.onclick=function(){rmFile(sfx);};
      container.appendChild(rb);
    }
  }
}
function rmFile(sfx){
  var pi=document.getElementById('pi_'+sfx);
  var ph=document.getElementById('ph_'+sfx);
  var box=document.getElementById('pb_'+sfx);
  if(pi){pi.src='';pi.style.display='none';}
  if(ph)ph.style.display='flex';
  if(box){var note=box.querySelector('.pb-pdf');if(note)note.remove();}
  var hf=document.getElementById('hf_'+sfx);
  if(hf)hf.value='';
  // Remove the remove button
  var container=box&&box.parentNode;
  if(container){var rb=container.querySelector('.pbr');if(rb)rb.remove();}
}

/* EXPIRY PREVIEW */
function calcPrevAll(sid,mid,pid){
  var s=document.getElementById(sid),m=document.getElementById(mid),p=document.getElementById(pid);
  if(!s||!m||!p||!s.value){if(p)p.innerHTML='';return;}
  var d=new Date(s.value);d.setMonth(d.getMonth()+parseInt(m.value||12));
  var dl2=Math.ceil((d-new Date().setHours(0,0,0,0))/864e5);
  var col=dl2<0?'var(--red)':dl2<=30?'var(--amber)':'var(--green)';
  p.innerHTML='Expira: <b>'+d.toLocaleDateString('ro-RO',{day:'2-digit',month:'short',year:'numeric'})+'</b> &mdash; <span style="color:'+col+'">'+(dl2<0?'Exp. '+Math.abs(dl2)+'z':dl2===0?'Azi!':dl2+'z')+'</span>';
}
function calcPrev(el){
  // Find the prefix from the element's ID
  var id=el.id;
  var prefix=id.substring(0,id.lastIndexOf('_'));
  calcPrevAll(prefix+'_s',prefix+'_m',prefix+'_p');
}
function calcRev(){
  var last=parseInt(document.getElementById('rv_l').value)||0;
  var cur=parseInt(document.getElementById('rv_c').value)||0;
  var iv=parseInt(document.getElementById('rv_i').value)||10000;
  var p=document.getElementById('rv_p');if(!p)return;
  if(!last){p.innerHTML='';return;}
  var nxt=last+iv,left=nxt-cur;
  p.innerHTML='Urm. la <b>'+nxt.toLocaleString('ro-RO')+' km</b> &mdash; '+(left>0?'<b>'+left.toLocaleString('ro-RO')+' km</b>':'<span style="color:var(--red)">dep. '+Math.abs(left).toLocaleString('ro-RO')+' km</span>');
}

function saveAdd(){
  var name=(document.getElementById('fn').value||'').trim();
  if(!name){alert('Introdu marca/modelul');return;}
  function gd(sk,mk){var s=document.getElementById(sk).value||'',m=parseInt(document.getElementById(mk).value||12);return s?{sd:s,mo:m,ex:am(s,m)}:{sd:'',mo:m,ex:''};}

      files:{rca:document.getElementById('hf_f_rca').value||'',carte:document.getElementById('hf_f_carte').value||'',talon:document.getElementById('hf_f_talon').value||''}
    }
  };
  cars.push(car);exp[car.id]=true;save();closeSheet();render();

/* EDIT CAR */
function editCar(id){

  openSheet(html);
  var body=document.getElementById('ebody');
  // Name + plate
  body.innerHTML='<div class="row"><div class="f"><label>Marca / Model</label><input class="inp" type="text" id="fen" value="'+car.name+'"></div><div class="f"><label>Numar inmatr.</label><input class="inp" type="text" id="fep" value="'+(car.plate||'')+'"></div></div>';
  // Photo
  var fpf=document.createElement('div');fpf.className='f';fpf.innerHTML='<label>Poza masina</label>';
  makePhotoBox(car.photo||'','car',fpf);body.appendChild(fpf);

  body.innerHTML+='<div class="row"><div class="f"><label>RCA &mdash; Data</label><input class="inp" type="date" id="rca_s" value="'+(rca.sd||'')+'" oninput="calcPrev(this)"></div><div class="f"><label>Valabilitate</label><select class="inp" id="rca_m" oninput="calcPrev(this)">'+perOpts(rca.mo||12)+'</select></div></div><div class="prev" id="rca_p"></div>';
  body.innerHTML+='<div class="row"><div class="f"><label>Rovinieta &mdash; Data</label><input class="inp" type="date" id="rov_s" value="'+(rov.sd||'')+'" oninput="calcPrev(this)"></div><div class="f"><label>Valabilitate</label><select class="inp" id="rov_m" oninput="calcPrev(this)">'+perOpts(rov.mo||3)+'</select></div></div><div class="prev" id="rov_p"></div>';
  // Revizie
  body.innerHTML+='<div class="sec">Revizie (km)</div><div class="row"><div class="f"><label>Ultima revizie la</label><input class="inp" type="number" id="rv_l" value="'+(rev.lk||'')+'" placeholder="ex: 110000" oninput="calcRev()"></div><div class="f"><label>Km actuali</label><input class="inp" type="number" id="rv_c" value="'+(rev.ck||'')+'" placeholder="ex: 115000" oninput="calcRev()"></div></div><div class="f"><label>Interval (km)</label><input class="inp" type="number" id="rv_i" value="'+(rev.iv||'10000')+'" oninput="calcRev()"></div><div class="prev" id="rv_p"></div>';
  // Files
  body.innerHTML+='<div class="sec">Fisiere documente</div>';
  var f1=document.createElement('div');f1.className='f';f1.innerHTML='<label>RCA &mdash; Fisier/Poza</label>';makePhotoBox(files.rca||'','f_rca',f1);body.appendChild(f1);
  var f2=document.createElement('div');f2.className='f';f2.innerHTML='<label>Carte masina</label>';makePhotoBox(files.carte||'','f_carte',f2);body.appendChild(f2);
  var f3=document.createElement('div');f3.className='f';f3.innerHTML='<label>Talon masina</label>';makePhotoBox(files.talon||'','f_talon',f3);body.appendChild(f3);
  // Trigger previews for existing dates
  setTimeout(function(){
    ['itp','rca','rov'].forEach(function(k){
      var el=document.getElementById(k+'_s');
      if(el&&el.value)calcPrev(el);
    });

  },50);

function saveEdit(id){
  var car=cars.find(function(c){return c.id===id;});if(!car)return;
  car.name=(document.getElementById('fen').value||'').trim()||car.name;
  car.plate=(document.getElementById('fep').value||'').trim();
  var ph=document.getElementById('hf_car').value;if(ph)car.photo=ph;
  if(!car.docs)car.docs={};
  // Docs
  function gd(sk,mk){var s=document.getElementById(sk).value||'',m=parseInt(document.getElementById(mk).value||12);return s?{sd:s,mo:m,ex:am(s,m)}:(car.docs[sk.replace('_s','')]||{sd:'',mo:m,ex:''});}
  car.docs.itp=gd('itp_s','itp_m');
  car.docs.rca=gd('rca_s','rca_m');
  car.docs.rovinieta=gd('rov_s','rov_m');
  car.docs.revizie={lk:document.getElementById('rv_l').value||'',ck:document.getElementById('rv_c').value||'',iv:document.getElementById('rv_i').value||'10000'};
  if(!car.docs.files)car.docs.files={};
  var r=document.getElementById('hf_f_rca').value;if(r||r==='')car.docs.files.rca=r;
  var ca=document.getElementById('hf_f_carte').value;if(ca||ca==='')car.docs.files.carte=ca;
  var t=document.getElementById('hf_f_talon').value;if(t||t==='')car.docs.files.talon=t;
  save();closeSheet();render();
}

/* EDIT DOC */
function editDoc(id,key){
  var car=cars.find(function(c){return c.id===id;});if(!car)return;
  if(key==='revizie'){
    var r=car.docs&&car.docs.revizie||{};
    openSheet('<div class="sheet-hd"><span>Revizie &mdash; '+car.name+'</span><button class="xbtn" onclick="closeSheet()">&#10005;</button></div>'+
      '<div class="body"><div class="row"><div class="f"><label>Ultima revizie la</label><input class="inp" type="number" id="rv_l" value="'+(r.lk||'')+'" placeholder="ex: 110000" oninput="calcRev()"></div><div class="f"><label>Km actuali</label><input class="inp" type="number" id="rv_c" value="'+(r.ck||'')+'" placeholder="ex: 115000" oninput="calcRev()"></div></div>'+
      '<div class="f"><label>Interval (km)</label><input class="inp" type="number" id="rv_i" value="'+(r.iv||'10000')+'" oninput="calcRev()"></div><div class="prev" id="rv_p"></div></div>'+
      '<button class="prim" onclick="saveRev('+id+')">Salveaza</button>');
    setTimeout(calcRev,50);return;
  }
  var doc=car.docs&&car.docs[key]||{};
  openSheet('<div class="sheet-hd"><span>'+DL[key]+' &mdash; '+car.name+'</span><button class="xbtn" onclick="closeSheet()">&#10005;</button></div>'+
    '<div class="body"><div class="row"><div class="f"><label>Data efectuarii</label><input class="inp" type="date" id="ds" value="'+(doc.sd||'')+'" oninput="calcPrev(this)"></div>'+
    '<div class="f"><label>Valabilitate</label><select class="inp" id="dm" oninput="calcPrev(this)">'+perOpts(doc.mo||12)+'</select></div></div>'+
    '<div class="prev" id="dp"></div></div>'+
    '<button class="prim" onclick="saveDoc('+id+',"'+key+'")">Salveaza</button>');
  setTimeout(function(){calcPrevAll('ds','dm','dp');},50);
}
function saveDoc(id,key){
  var car=cars.find(function(c){return c.id===id;});if(!car)return;
  var s=(document.getElementById('ds').value||'').trim();
  var m=parseInt(document.getElementById('dm').value||12);
  if(!car.docs[key])car.docs[key]={};
  car.docs[key].sd=s;car.docs[key].mo=m;car.docs[key].ex=s?am(s,m):'';
  save();closeSheet();render();
}
function saveRev(id){
  var car=cars.find(function(c){return c.id===id;});if(!car)return;
  car.docs.revizie={lk:document.getElementById('rv_l').value||'',ck:document.getElementById('rv_c').value||'',iv:document.getElementById('rv_i').value||'10000'};
  save();closeSheet();render();
}

/* VIEW FILE */
function viewFile(id,fk,data,label){
  var car=cars.find(function(c){return c.id===id;});if(!car)return;
  var isImg=data.startsWith('data:image');
  openSheet('<div class="sheet-hd"><span>'+label+'</span><button class="xbtn" onclick="closeSheet()">&#10005;</button></div>'+
    '<div class="body">'+
      (isImg?'<img src="'+data+'" style="width:100%;border-radius:10px;max-height:65vh;object-fit:contain;">':
        '<div style="text-align:center;padding:30px"><div style="font-size:48px">&#128196;</div><div style="margin:12px 0;color:var(--text2)">Fisier PDF salvat</div><a href="'+data+'" download="'+fk+'.pdf" style="display:inline-block;background:var(--accent);color:var(--at);padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600">&#11015; Descarca</a></div>')+
      '<button style="width:100%;margin-top:12px;padding:10px;background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;" onclick="delFile('+id+',"'+fk+'")">&#10005; Sterge fisierul</button>'+
    '</div>');
}
function delFile(id,fk){
  var car=cars.find(function(c){return c.id===id;});if(!car)return;
  if(car.docs&&car.docs.files)car.docs.files[fk]='';
  save();closeSheet();render();
}
